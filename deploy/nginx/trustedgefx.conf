# ============================================================
# Nginx config for TrustEdge — trustedgefx.com
# Cloudflare Origin SSL + reverse proxy to Docker containers
# ============================================================

# ── Rate limiting zones ──────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=20r/s;

# ── Upstream definitions ─────────────────────────────────────
upstream trader_frontend {
    server 127.0.0.1:3012;
}

upstream admin_frontend {
    server 127.0.0.1:3013;
}

upstream gateway_api {
    server 127.0.0.1:8002;
}

# ── Redirect www → apex ──────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.trustedgefx.com;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin-key.pem;

    return 301 https://trustedgefx.com$request_uri;
}

# ── HTTP → HTTPS redirect (Cloudflare handles this, but just in case) ──
server {
    listen 80;
    listen [::]:80;
    server_name trustedgefx.com www.trustedgefx.com admin.trustedgefx.com api.trustedgefx.com;
    return 301 https://$host$request_uri;
}

# ==============================================================
# 1) TRADER FRONTEND — trustedgefx.com
# ==============================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name trustedgefx.com;

    # ── Cloudflare Origin SSL ─────────────────────────────────
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Client body size (for KYC uploads) ────────────────────
    client_max_body_size 15M;

    # ── Rate limiting ─────────────────────────────────────────
    limit_req zone=web_limit burst=40 nodelay;

    # ── Real IP from Cloudflare ───────────────────────────────
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Proxy to Next.js trader frontend ──────────────────────
    location / {
        proxy_pass http://trader_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # ── Next.js static assets — long cache ────────────────────
    location /_next/static/ {
        proxy_pass http://trader_frontend;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}

